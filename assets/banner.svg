<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#484f58"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Graph edges (wikilinks) -->
  <g stroke="#30363d" stroke-width="1" opacity="0.6">
    <!-- Left cluster -->
    <line x1="80" y1="60" x2="140" y2="100"/>
    <line x1="80" y1="60" x2="120" y2="40"/>
    <line x1="120" y1="40" x2="170" y2="55"/>
    <line x1="140" y1="100" x2="170" y2="55"/>
    <line x1="140" y1="100" x2="110" y2="145"/>
    <line x1="110" y1="145" x2="165" y2="155"/>
    <line x1="140" y1="100" x2="165" y2="155"/>
    <!-- Left to center -->
    <line x1="170" y1="55" x2="250" y2="80" stroke-dasharray="4 4"/>
    <line x1="165" y1="155" x2="260" y2="135" stroke-dasharray="4 4"/>
    <!-- Right cluster -->
    <line x1="640" y1="50" x2="690" y2="90"/>
    <line x1="690" y1="90" x2="730" y2="60"/>
    <line x1="690" y1="90" x2="720" y2="130"/>
    <line x1="720" y1="130" x2="680" y2="155"/>
    <line x1="690" y1="90" x2="680" y2="155"/>
    <line x1="640" y1="50" x2="680" y2="155" opacity="0.3"/>
    <!-- Right to center -->
    <line x1="640" y1="50" x2="560" y2="75" stroke-dasharray="4 4"/>
    <line x1="680" y1="155" x2="555" y2="135" stroke-dasharray="4 4"/>
  </g>

  <!-- Graph nodes — left cluster -->
  <g opacity="0.5">
    <circle cx="80" cy="60" r="4" fill="#484f58"/>
    <circle cx="120" cy="40" r="3" fill="#484f58"/>
    <circle cx="170" cy="55" r="5" fill="#6e7681"/>
    <circle cx="140" cy="100" r="6" fill="#6e7681"/>
    <circle cx="110" cy="145" r="3.5" fill="#484f58"/>
    <circle cx="165" cy="155" r="4" fill="#484f58"/>
  </g>

  <!-- Graph nodes — right cluster -->
  <g opacity="0.5">
    <circle cx="640" cy="50" r="5" fill="#6e7681"/>
    <circle cx="730" cy="60" r="3" fill="#484f58"/>
    <circle cx="690" cy="90" r="6" fill="#6e7681"/>
    <circle cx="720" cy="130" r="3.5" fill="#484f58"/>
    <circle cx="680" cy="155" r="4" fill="#484f58"/>
  </g>

  <!-- Title -->
  <text x="400" y="88" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="url(#accent)" filter="url(#softglow)">autology</text>

  <!-- Tagline -->
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#8b949e" letter-spacing="3">LIVING ONTOLOGY FOR CLAUDE CODE</text>

  <!-- Accent dots on center nodes (hub glow) -->
  <circle cx="250" cy="80" r="3" fill="#58a6ff" opacity="0.4" filter="url(#glow)"/>
  <circle cx="260" cy="135" r="2.5" fill="#bc8cff" opacity="0.35" filter="url(#glow)"/>
  <circle cx="560" cy="75" r="3" fill="#58a6ff" opacity="0.4" filter="url(#glow)"/>
  <circle cx="555" cy="135" r="2.5" fill="#bc8cff" opacity="0.35" filter="url(#glow)"/>
</svg>
